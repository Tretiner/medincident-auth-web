name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./auth

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Устанавливаем Bun
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Устанавливаем зависимости
      - name: Install dependencies
        run: bun install

      - name: Run Next.js Linter
        run: bun run lint