syntax = "proto3";

package medincident.user.v1;

import "medincident/user/v1/user.proto";

service UserService {
  rpc Create(CreateRequest) returns (CreateResponse);
  rpc ValidatePersonName(ValidatePersonNameRequest) returns (ValidatePersonNameResponse);
}

message CreateRequest {
  string     identity_id = 1;
  PersonName name        = 2;
}

message CreateResponse {
  string user_id = 1;
}

message ValidatePersonNameRequest{
  PersonName name = 1;
}

message ValidatePersonNameResponse{}